name: Update Pages Data

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/collect_static_data.py
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Roblox analytics data"
          file_pattern: docs/data/*.json
