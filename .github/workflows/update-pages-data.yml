name: Update Pages Data

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    # GitHub's shortest supported schedule interval is 5 minutes.
    # Starting at minute 2 avoids the busiest top-of-hour queue.
    - cron: "2/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-pages-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/collect_static_data.py
        env:
          GAME_SCAN_LIMIT: "1500"
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Roblox analytics data"
          file_pattern: docs/data/*.json
